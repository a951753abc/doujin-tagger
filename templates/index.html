<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同人誌搜尋系統</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/autocomplete.js"></script>
</head>
<body>
    <header>
        <h1>同人誌搜尋系統</h1>
        <div class="header-nav">
            <button id="nav-search" class="active" onclick="showPage('search')">搜尋</button>
            <button id="nav-stats" onclick="showPage('stats')">統計</button>
            <button id="nav-merge" onclick="showPage('merge')">合併管理</button>
            <button id="nav-settings" onclick="showPage('settings')">設定</button>
            <div class="recent-dropdown" id="recent-dropdown">
                <button id="btn-recent" onclick="toggleRecent()">最近開啟</button>
                <div class="recent-list" id="recent-list" style="display:none"></div>
            </div>
            <button id="btn-rescan" onclick="rescan()">重新掃描</button>
        </div>
    </header>

    <section class="filters">
        <div class="search-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
            </svg>
            <input type="text" id="q" placeholder="關鍵字搜尋（標題、作者、社團、原作…）" autocomplete="off">
        </div>
        <button class="filter-toggle" id="filter-toggle" aria-expanded="true" onclick="toggleFilters()">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
            </svg>
            進階篩選
        </button>
        <div class="category-tabs" id="category-tabs">
            <button class="cat-tab active" data-cat="" onclick="selectCategory(this)">全部</button>
            <button class="cat-tab" data-cat="同人誌" onclick="selectCategory(this)">同人誌</button>
            <button class="cat-tab" data-cat="CG" onclick="selectCategory(this)">CG</button>
            <button class="cat-tab" data-cat="商業誌" onclick="selectCategory(this)">商業誌</button>
        </div>
        <div class="source-tabs" id="source-tabs">
            <button class="src-tab active" data-src="" onclick="selectSource(this)">全部來源</button>
            <button class="src-tab" data-src="archive" onclick="selectSource(this)">歸檔區 <span id="src-archive-count" class="tab-count"></span></button>
            <button class="src-tab" data-src="downloads" onclick="selectSource(this)">下載區 <span id="src-downloads-count" class="tab-count"></span></button>
        </div>
        <div class="advanced-filters expanded" id="advanced-filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>場次</label>
                    <input type="text" id="f-event" placeholder="輸入篩選…">
                </div>
                <div class="filter-group">
                    <label>原作</label>
                    <input type="text" id="f-parody" placeholder="輸入篩選…">
                </div>
                <div class="filter-group">
                    <label>社團</label>
                    <input type="text" id="f-circle" placeholder="輸入篩選…">
                </div>
                <div class="filter-group">
                    <label>作者</label>
                    <input type="text" id="f-author" placeholder="輸入篩選…">
                </div>
            </div>
            <div class="null-filter-row">
                <label class="null-checkbox"><input type="checkbox" id="null-parody" onchange="debounceSearch()"> 原作未分類 <span id="null-parody-count"></span></label>
                <label class="null-checkbox"><input type="checkbox" id="null-event" onchange="debounceSearch()"> 場次未分類 <span id="null-event-count"></span></label>
                <label class="null-checkbox"><input type="checkbox" id="null-circle" onchange="debounceSearch()"> 社團未分類 <span id="null-circle-count"></span></label>
                <label class="null-checkbox"><input type="checkbox" id="null-author" onchange="debounceSearch()"> 作者未分類 <span id="null-author-count"></span></label>
            </div>
            <div class="tag-filter-row" id="tag-filters"></div>
        </div>
        <div class="active-filters" id="active-filters"></div>
        <div class="browse-panel" id="browse-panel" style="display:none">
            <div class="browse-tabs">
                <button class="browse-tab active" onclick="switchBrowseTab(this,'parody')">原作</button>
                <button class="browse-tab" onclick="switchBrowseTab(this,'author')">作者</button>
                <button class="browse-tab" onclick="switchBrowseTab(this,'circle')">社團</button>
                <button class="browse-tab" onclick="switchBrowseTab(this,'event')">場次</button>
                <button class="browse-tab" onclick="switchBrowseTab(this,'tags')">Tags</button>
                <input type="text" class="browse-search" id="browse-search" placeholder="篩選..." oninput="filterBrowseList()">
            </div>
            <div class="browse-list" id="browse-list"></div>
        </div>
        <div class="action-row">
            <span id="result-count"></span>
            <div class="sort-controls">
                <select id="sort-field" onchange="currentPage=1;doSearch()">
                    <option value="event">場次</option>
                    <option value="title">標題</option>
                    <option value="circle">社團</option>
                    <option value="author">作者</option>
                    <option value="parody">原作</option>
                    <option value="created_at">入庫時間</option>
                </select>
                <button id="sort-order" class="btn-sort-order" onclick="toggleSortOrder()" title="切換排序方向">↓</button>
            </div>
            <button onclick="clearFilters()">清除篩選</button>
            <button onclick="toggleBrowsePanel()" id="btn-browse">瀏覽清單</button>
            <div class="view-toggle">
                <button id="btn-list" class="view-btn active" onclick="setViewMode('list')" title="列表模式">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="1" width="16" height="3" rx="1"/><rect x="0" y="6.5" width="16" height="3" rx="1"/><rect x="0" y="12" width="16" height="3" rx="1"/></svg>
                </button>
                <button id="btn-grid" class="view-btn" onclick="setViewMode('grid')" title="格子模式">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/><rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/></svg>
                </button>
            </div>
        </div>
    </section>

    <!-- 批次操作工具列 -->
    <div class="batch-toolbar" id="batch-toolbar" style="display:none">
        <span id="batch-count">已選 0 筆</span>
        <button onclick="selectAllVisible()">全選</button>
        <button onclick="invertSelection()">反選</button>
        <div class="batch-action">
            <input type="text" id="batch-tag" placeholder="批次加 Tag">
            <button onclick="batchAddTag()" class="btn-open">加 Tag</button>
        </div>
        <div class="batch-action">
            <input type="text" id="batch-parody" placeholder="批次改原作">
            <button onclick="batchUpdateField('parody')" class="btn-open">套用</button>
        </div>
        <div class="batch-action">
            <select id="batch-category">
                <option value="">批次改分類</option>
                <option value="同人誌">同人誌</option>
                <option value="CG">CG</option>
                <option value="商業誌">商業誌</option>
            </select>
            <button onclick="batchUpdateCategory()" class="btn-open">套用</button>
        </div>
        <button onclick="clearSelection()" class="btn-secondary">取消選取</button>
    </div>

    <section class="results" id="results"></section>

    <section class="pagination" id="pagination"></section>

    <!-- 合併管理頁面 -->
    <div id="page-merge" style="display:none">
        <section class="merge-page">
            <div class="merge-controls">
                <select id="merge-field" onchange="loadDuplicates()">
                    <option value="parody">原作 (parody)</option>
                    <option value="author">作者 (author)</option>
                    <option value="circle">社團 (circle)</option>
                    <option value="event">場次 (event)</option>
                </select>
                <span class="merge-summary" id="merge-summary"></span>
            </div>
            <div id="merge-list"></div>
        </section>
    </div>

    <!-- 設定頁面 -->
    <div id="page-settings" style="display:none">
        <section class="settings-page">
            <h2>設定</h2>
            <div class="setting-group">
                <label>掃描路徑</label>
                <div id="scan-roots-list"></div>
                <div class="setting-input-row">
                    <input type="text" id="new-scan-path" placeholder="例: D:/同人誌">
                </div>
                <div class="setting-input-row" style="margin-top:6px">
                    <select id="new-scan-source">
                        <option value="archive">歸檔區</option>
                        <option value="downloads">下載區</option>
                    </select>
                    <button onclick="addScanRoot()" class="btn-open">新增</button>
                </div>
                <div class="setting-hint">同人誌所在的資料夾路徑。歸檔區＝已整理，下載區＝新下載未整理。新增後請點「重新掃描」。</div>
            </div>
            <div class="setting-group">
                <label>閱讀器路徑</label>
                <div class="setting-input-row">
                    <input type="text" id="setting-viewer-path" placeholder="閱讀器程式路徑（留空則用系統預設）">
                </div>
                <div class="setting-hint">用於「閱讀」按鈕開啟檔案的程式路徑</div>
            </div>
            <div class="setting-group">
                <label>縮圖設定</label>
                <div class="setting-input-row">
                    <input type="text" id="setting-thumb-size" placeholder="300x400" style="width:120px">
                    <span style="color:var(--muted);margin:0 8px">尺寸（寬x高）</span>
                    <input type="number" id="setting-thumb-quality" min="1" max="100" placeholder="80" style="width:80px">
                    <span style="color:var(--muted);margin:0 8px">品質（1-100）</span>
                </div>
                <div class="setting-input-row" style="margin-top:6px">
                    <button onclick="saveSettings()" class="btn-open">儲存</button>
                    <button onclick="clearThumbs()" class="btn-delete-small" style="margin-left:8px">清除縮圖快取</button>
                </div>
                <div class="setting-hint">變更尺寸或品質後，需清除快取才能套用到已有的縮圖</div>
            </div>
        </section>
    </div>

    <!-- 統計頁面 -->
    <div id="page-stats" style="display:none">
        <section class="stats-page">
            <div class="stats-summary" id="stats-summary"></div>
            <div class="stats-grid">
                <div class="stat-section"><h3>原作 Top 20</h3><div id="stat-parody"></div></div>
                <div class="stat-section"><h3>作者 Top 20</h3><div id="stat-author"></div></div>
                <div class="stat-section"><h3>社團 Top 20</h3><div id="stat-circle"></div></div>
                <div class="stat-section"><h3>場次 Top 30</h3><div id="stat-event"></div></div>
            </div>
        </section>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toast-container"></div>

    <!-- 編輯 modal -->
    <div class="modal-overlay" id="edit-modal" style="display:none" onmousedown="if(event.target===this)this._shouldClose=true" onmouseup="if(event.target===this&&this._shouldClose)closeEditModal();this._shouldClose=false">
        <div class="modal">
            <h3>編輯 Metadata</h3>
            <input type="hidden" id="edit-id">
            <label>場次 <input type="text" id="edit-event"></label>
            <label>社團 <input type="text" id="edit-circle"></label>
            <label>作者 <input type="text" id="edit-author"></label>
            <label>標題 <input type="text" id="edit-title"></label>
            <label>原作 <input type="text" id="edit-parody"></label>
            <label>分類
                <select id="edit-category">
                    <option value="同人誌">同人誌</option>
                    <option value="CG">CG</option>
                    <option value="商業誌">商業誌</option>
                </select>
            </label>
            <div class="web-search-section">
                <button onclick="webSearchSuggestions()" id="btn-web-search" class="btn-web-search">Web 搜尋建議</button>
                <div id="web-search-results" class="web-search-results" style="display:none"></div>
            </div>
            <div class="modal-actions">
                <button onclick="saveEdit()">儲存</button>
                <button onclick="closeEditModal()" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

<script>
let currentPage = 1;
let debounceTimer = null;
let allTags = [];
let sortOrder = 'desc';
let viewMode = localStorage.getItem('viewMode') || 'list';

// ── Toast 通知 ──
function showToast(message, type = 'success', duration = 3000) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.style.setProperty('--toast-duration', `${duration}ms`);
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), duration + 400);
}

// ── 初始化 ──
async function init() {
    await Promise.all([loadFilters(), loadTags()]);
    // 從後端取得 thumb_size 設定，套用到格子寬度
    fetch('/api/settings').then(r => r.json()).then(d => applyThumbSizeToGrid(d.thumb_size)).catch(() => {});
    initViewMode();
    doSearch();

    document.getElementById('q').addEventListener('input', debounceSearch);
    document.getElementById('f-event').addEventListener('change', () => { currentPage = 1; doSearch(); });
    document.getElementById('f-event').addEventListener('input', debounceSearch);
    document.getElementById('f-parody').addEventListener('change', () => { currentPage = 1; doSearch(); });
    document.getElementById('f-circle').addEventListener('change', () => { currentPage = 1; doSearch(); });
    document.getElementById('f-author').addEventListener('change', () => { currentPage = 1; doSearch(); });

    // 全域鍵盤快捷鍵
    document.addEventListener('keydown', e => {
        const tag = document.activeElement.tagName;
        const inInput = (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT');

        if (e.key === 'Escape') {
            if (document.getElementById('edit-modal').style.display !== 'none') {
                closeEditModal();
            } else if (inInput) {
                document.activeElement.blur();
            }
            return;
        }

        if (inInput) return;

        if (e.key === '/') {
            e.preventDefault();
            document.getElementById('q').focus();
            return;
        }

        // j/k 導覽卡片
        const cards = [...document.querySelectorAll('#results .card')];
        if (cards.length === 0) return;
        const idx = cards.indexOf(document.activeElement);
        if (e.key === 'j') {
            e.preventDefault();
            cards[Math.min(idx + 1, cards.length - 1)].focus();
        } else if (e.key === 'k') {
            e.preventDefault();
            cards[Math.max(idx - 1, 0)].focus();
        }
    });

    // 卡片 Enter 開啟
    document.getElementById('results').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.classList.contains('card')) {
            const id = e.target.dataset.id;
            if (id) openFile(parseInt(id));
        }
    });
}

function debounceSearch() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage = 1; doSearch(); }, 300);
}

// ── 分類篩選 ──
function selectCategory(btn) {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPage = 1;
    doSearch();
}

function getSelectedCategory() {
    const active = document.querySelector('.cat-tab.active');
    return active ? active.dataset.cat : '';
}

// ── 來源篩選 ──
function selectSource(btn) {
    document.querySelectorAll('.src-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPage = 1;
    doSearch();
}

function getSelectedSource() {
    const active = document.querySelector('.src-tab.active');
    return active ? active.dataset.src : '';
}

// ── 排序 ──
function toggleSortOrder() {
    sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
    document.getElementById('sort-order').textContent = sortOrder === 'desc' ? '↓' : '↑';
    currentPage = 1;
    doSearch();
}

// ── 進階篩選收合 ──
function toggleFilters() {
    const btn = document.getElementById('filter-toggle');
    const panel = document.getElementById('advanced-filters');
    const expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!expanded));
    panel.classList.toggle('collapsed', expanded);
    panel.classList.toggle('expanded', !expanded);
}

// ── 載入篩選選項 ──
let acInstances = {};

async function loadFilters() {
    const res = await fetch('/api/filters');
    const data = await res.json();

    const acConfig = [
        {id: 'f-event', data: data.event},
        {id: 'f-parody', data: data.parody},
        {id: 'f-circle', data: data.circle},
        {id: 'f-author', data: data.author},
    ];

    acConfig.forEach(({id, data: items}) => {
        if (acInstances[id]) acInstances[id].destroy();
        const ac = new AutoComplete(document.getElementById(id), {
            onSelect: () => { currentPage = 1; doSearch(); },
        });
        ac.setData(items);
        acInstances[id] = ac;
    });

    document.getElementById('null-parody-count').textContent = `(${data.parody_null_count})`;
    document.getElementById('null-event-count').textContent = `(${data.event_null_count})`;
    document.getElementById('null-circle-count').textContent = `(${data.circle_null_count})`;
    document.getElementById('null-author-count').textContent = `(${data.author_null_count})`;

    // 來源統計
    if (data.sources) {
        const archiveCount = data.sources.archive || 0;
        const dlCount = data.sources.downloads || 0;
        document.getElementById('src-archive-count').textContent = archiveCount ? `(${archiveCount.toLocaleString()})` : '';
        document.getElementById('src-downloads-count').textContent = dlCount ? `(${dlCount.toLocaleString()})` : '';
    }
}

// ── 載入 Tags ──
async function loadTags() {
    const res = await fetch('/api/tags');
    allTags = await res.json();
    renderTagFilters();
}

function renderTagFilters() {
    const container = document.getElementById('tag-filters');
    if (allTags.length === 0) {
        container.innerHTML = '';
        return;
    }
    container.innerHTML = '<span class="tag-filter-label">Tags:</span>' +
        allTags.map(t =>
            `<label class="tag-chip-filter">
                <input type="checkbox" value="${t.name}" onchange="debounceSearch()">
                ${t.name} <span class="tag-count">(${t.count})</span>
            </label>`
        ).join('');
}

function getSelectedTags() {
    return [...document.querySelectorAll('#tag-filters input:checked')].map(cb => cb.value);
}

// ── 瀏覽面板 ──
let browseData = {};
let currentBrowseTab = 'parody';

function toggleBrowsePanel() {
    const panel = document.getElementById('browse-panel');
    const visible = panel.style.display !== 'none';
    panel.style.display = visible ? 'none' : '';
    if (!visible) loadBrowseData();
}

async function loadBrowseData() {
    const [filterRes, tagRes] = await Promise.all([fetch('/api/filters'), fetch('/api/tags')]);
    const filters = await filterRes.json();
    const tags = await tagRes.json();
    browseData = {
        parody: filters.parody || [],
        author: filters.author || [],
        circle: filters.circle || [],
        event: filters.event || [],
        tags: tags.map(t => ({value: t.name, count: t.count})),
    };
    renderBrowseList();
}

function switchBrowseTab(btn, tab) {
    currentBrowseTab = tab;
    document.querySelectorAll('.browse-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('browse-search').value = '';
    renderBrowseList();
}

function renderBrowseList() {
    const list = document.getElementById('browse-list');
    const items = browseData[currentBrowseTab] || [];
    const search = document.getElementById('browse-search').value.toLowerCase();
    const filtered = search ? items.filter(i => i.value.toLowerCase().includes(search)) : items;
    const sorted = [...filtered].sort((a, b) => b.count - a.count);

    if (sorted.length === 0) {
        list.innerHTML = '<div class="browse-empty">無資料</div>';
        return;
    }
    const maxCount = sorted[0].count;
    list.innerHTML = sorted.map(item => {
        const pct = maxCount > 0 ? (item.count / maxCount * 100) : 0;
        return `<div class="browse-item" data-field="${currentBrowseTab}" data-value="${escAttr(item.value)}" onclick="applyBrowseFilter(this.dataset.field, this.dataset.value)">
            <div class="browse-bar" style="width:${pct}%"></div>
            <span class="browse-label">${esc(item.value)}</span>
            <span class="browse-count">${item.count}</span>
        </div>`;
    }).join('');
}

function filterBrowseList() { renderBrowseList(); }

function applyBrowseFilter(field, value) {
    if (field === 'tags') {
        const cb = document.querySelector(`#tag-filters input[value="${CSS.escape(value)}"]`);
        if (cb && !cb.checked) { cb.checked = true; debounceSearch(); }
        return;
    }
    const inputMap = {event:'f-event', parody:'f-parody', circle:'f-circle', author:'f-author'};
    const input = document.getElementById(inputMap[field]);
    if (input) {
        input.value = value;
        if (acInstances[inputMap[field]]) acInstances[inputMap[field]]._close();
        currentPage = 1;
        doSearch();
    }
}

// ── 批次操作 ──
let selectedIds = new Set();

function updateBatchToolbar() {
    const toolbar = document.getElementById('batch-toolbar');
    if (selectedIds.size > 0) {
        toolbar.style.display = '';
        document.getElementById('batch-count').textContent = `已選 ${selectedIds.size} 筆`;
    } else {
        toolbar.style.display = 'none';
    }
}

function toggleSelect(id, checkbox) {
    if (checkbox.checked) selectedIds.add(id);
    else selectedIds.delete(id);
    const card = checkbox.closest('.card');
    if (card) card.classList.toggle('selected', checkbox.checked);
    updateBatchToolbar();
}

function selectAllVisible() {
    document.querySelectorAll('#results .card-checkbox').forEach(cb => {
        cb.checked = true;
        const id = parseInt(cb.dataset.id);
        selectedIds.add(id);
        cb.closest('.card')?.classList.add('selected');
    });
    updateBatchToolbar();
}

function invertSelection() {
    document.querySelectorAll('#results .card-checkbox').forEach(cb => {
        cb.checked = !cb.checked;
        const id = parseInt(cb.dataset.id);
        if (cb.checked) { selectedIds.add(id); cb.closest('.card')?.classList.add('selected'); }
        else { selectedIds.delete(id); cb.closest('.card')?.classList.remove('selected'); }
    });
    updateBatchToolbar();
}

function clearSelection() {
    selectedIds.clear();
    document.querySelectorAll('#results .card-checkbox').forEach(cb => {
        cb.checked = false;
        cb.closest('.card')?.classList.remove('selected');
    });
    updateBatchToolbar();
}

async function batchAddTag() {
    const name = document.getElementById('batch-tag').value.trim();
    if (!name || selectedIds.size === 0) return;
    const res = await fetch('/api/batch/tags', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids: [...selectedIds], name})
    });
    const data = await res.json();
    showToast(`已為 ${data.added} 筆加上 Tag: ${name}`);
    document.getElementById('batch-tag').value = '';
    clearSelection();
    await Promise.all([loadTags(), doSearch()]);
}

async function batchUpdateField(field) {
    const input = document.getElementById(`batch-${field}`);
    const value = input.value.trim();
    if (!value || selectedIds.size === 0) return;
    const res = await fetch('/api/batch/update', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids: [...selectedIds], fields: {[field]: value}})
    });
    const data = await res.json();
    showToast(`已更新 ${data.updated} 筆的${field}`);
    input.value = '';
    clearSelection();
    doSearch();
}

async function batchUpdateCategory() {
    const sel = document.getElementById('batch-category');
    const value = sel.value;
    if (!value || selectedIds.size === 0) return;
    const res = await fetch('/api/batch/update', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ids: [...selectedIds], fields: {category: value}})
    });
    const data = await res.json();
    showToast(`已更新 ${data.updated} 筆的分類為 ${value}`);
    sel.value = '';
    clearSelection();
    doSearch();
}

// ── 檢視模式 ──
function setViewMode(mode) {
    viewMode = mode;
    localStorage.setItem('viewMode', mode);
    document.getElementById('btn-list').classList.toggle('active', mode === 'list');
    document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
    const container = document.getElementById('results');
    container.classList.toggle('results-grid', mode === 'grid');
    // 若已有結果，重新渲染
    if (container._lastItems) renderResults(container._lastItems);
}

function initViewMode() {
    document.getElementById('btn-list').classList.toggle('active', viewMode === 'list');
    document.getElementById('btn-grid').classList.toggle('active', viewMode === 'grid');
    document.getElementById('results').classList.toggle('results-grid', viewMode === 'grid');
}

function applyThumbSizeToGrid(thumbSize) {
    const m = (thumbSize || '300x400').match(/^(\d+)x(\d+)$/);
    if (!m) return;
    const w = parseInt(m[1], 10);
    // 用寬度的 2/3 作為格子最小寬度，避免太大
    const minW = Math.max(150, Math.round(w * 2 / 3));
    document.documentElement.style.setProperty('--grid-min-w', minW + 'px');
}

// ── Badge 點擊篩選（event delegation）──
document.getElementById('results').addEventListener('click', e => {
    const badge = e.target.closest('[data-filter-field]');
    if (!badge) return;
    const field = badge.dataset.filterField;
    const value = badge.dataset.filterValue;
    const fieldMap = {event: 'f-event', circle: 'f-circle', author: 'f-author', parody: 'f-parody'};
    const inputId = fieldMap[field];
    if (!inputId) return;
    // 取消對應的 null checkbox
    const nullCb = document.getElementById(`null-${field}`);
    if (nullCb) nullCb.checked = false;
    document.getElementById(inputId).value = value;
    currentPage = 1;
    doSearch();
    showToast(`篩選 ${field}: ${value}`, 'info');
});

// ── 活躍篩選 Pill ──
function renderActiveFilters() {
    const container = document.getElementById('active-filters');
    const pills = [];
    const fields = [
        {id: 'f-event', label: '場次'},
        {id: 'f-parody', label: '原作'},
        {id: 'f-circle', label: '社團'},
        {id: 'f-author', label: '作者'},
    ];
    fields.forEach(f => {
        const val = document.getElementById(f.id).value.trim();
        if (val) pills.push({label: f.label, value: val, inputId: f.id});
    });
    const nullFields = [
        {id: 'null-event', label: '場次未分類'},
        {id: 'null-parody', label: '原作未分類'},
        {id: 'null-circle', label: '社團未分類'},
        {id: 'null-author', label: '作者未分類'},
    ];
    nullFields.forEach(f => {
        if (document.getElementById(f.id).checked)
            pills.push({label: f.label, value: null, checkboxId: f.id});
    });
    getSelectedTags().forEach(t => {
        pills.push({label: 'Tag', value: t, isTag: true});
    });
    const cat = getSelectedCategory();
    if (cat) pills.push({label: '分類', value: cat, isCat: true});
    const src = getSelectedSource();
    if (src) pills.push({label: '來源', value: src === 'archive' ? '歸檔區' : '下載區', isSrc: true});

    if (pills.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = pills.map((p, i) =>
        `<span class="filter-pill">${p.label}: ${p.value || ''} <button onclick="removePill(${i})" title="移除">&times;</button></span>`
    ).join('');
    container._pills = pills;
}

function removePill(index) {
    const pills = document.getElementById('active-filters')._pills;
    const p = pills[index];
    if (p.inputId) document.getElementById(p.inputId).value = '';
    if (p.checkboxId) document.getElementById(p.checkboxId).checked = false;
    if (p.isTag) {
        document.querySelectorAll('#tag-filters input').forEach(cb => {
            if (cb.value === p.value) cb.checked = false;
        });
    }
    if (p.isCat) {
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        document.querySelector('.cat-tab[data-cat=""]').classList.add('active');
    }
    if (p.isSrc) {
        document.querySelectorAll('.src-tab').forEach(b => b.classList.remove('active'));
        document.querySelector('.src-tab[data-src=""]').classList.add('active');
    }
    currentPage = 1;
    doSearch();
}

// ── 搜尋 ──
async function doSearch() {
    const params = new URLSearchParams();
    const q = document.getElementById('q').value.trim();
    if (q) params.set('q', q);

    const event = document.getElementById('null-event').checked ? '__null__' : document.getElementById('f-event').value.trim();
    if (event) params.set('event', event);

    const parody = document.getElementById('null-parody').checked ? '__null__' : document.getElementById('f-parody').value.trim();
    if (parody) params.set('parody', parody);

    const circle = document.getElementById('null-circle').checked ? '__null__' : document.getElementById('f-circle').value.trim();
    if (circle) params.set('circle', circle);

    const author = document.getElementById('null-author').checked ? '__null__' : document.getElementById('f-author').value.trim();
    if (author) params.set('author', author);

    getSelectedTags().forEach(t => params.append('tags', t));

    params.set('page', currentPage);
    params.set('per_page', 50);
    params.set('sort', document.getElementById('sort-field').value);
    params.set('order', sortOrder);
    const cat = getSelectedCategory();
    if (cat) params.set('category', cat);
    const src = getSelectedSource();
    if (src) params.set('source', src);

    // 顯示骨架屏
    showSkeleton();

    const res = await fetch('/api/search?' + params);
    const data = await res.json();

    document.getElementById('result-count').textContent = `找到 ${data.total.toLocaleString()} 筆結果`;
    renderActiveFilters();
    renderResults(data.results);
    renderPagination(data.total, data.page, data.per_page);
}

// ── 骨架屏 ──
function showSkeleton() {
    const container = document.getElementById('results');
    container.innerHTML = Array.from({length: 6}, () => `
        <div class="skeleton-card">
            <div class="skeleton-line title"></div>
            <div class="skeleton-line meta"></div>
            <div class="skeleton-line short"></div>
        </div>
    `).join('');
}

// ── 渲染結果 ──
function renderResults(items) {
    const container = document.getElementById('results');
    container._lastItems = items;
    container.classList.toggle('results-grid', viewMode === 'grid');

    if (items.length === 0) {
        container.innerHTML = '<div class="no-results">沒有找到符合條件的結果</div>';
        return;
    }

    const badgesHtml = item => `
        ${item.event ? `<span class="meta-badge event clickable" data-filter-field="event" data-filter-value="${escAttr(item.event)}" title="篩選場次: ${escAttr(item.event)}">${esc(item.event)}</span>` : ''}
        ${item.circle ? `<span class="meta-badge circle clickable" data-filter-field="circle" data-filter-value="${escAttr(item.circle)}" title="篩選社團: ${escAttr(item.circle)}">${esc(item.circle)}</span>` : ''}
        ${item.author ? `<span class="meta-badge author clickable" data-filter-field="author" data-filter-value="${escAttr(item.author)}" title="篩選作者: ${escAttr(item.author)}">${esc(item.author)}</span>` : ''}
        ${item.parody ? `<span class="meta-badge parody clickable" data-filter-field="parody" data-filter-value="${escAttr(item.parody)}" title="篩選原作: ${escAttr(item.parody)}">${esc(item.parody)}</span>` : ''}
        ${item.is_dl ? '<span class="meta-badge dl">DL版</span>' : ''}
        ${item.category && item.category !== '同人誌' ? `<span class="meta-badge cat-${item.category === 'CG' ? 'cg' : 'commercial'}">${esc(item.category)}</span>` : ''}
        ${item.source === 'downloads' ? '<span class="meta-badge source-dl">下載區</span>' : ''}`;

    const tagsHtml = item => `
        ${item.tags.map(t => `<span class="tag-chip">${esc(t.name)} <button onclick="removeTag(${item.id},${t.id})" title="移除 tag">&times;</button></span>`).join('')}
        <button class="btn-add-tag" onclick="showAddTag(${item.id})">+ tag</button>
        <span class="add-tag-input" id="add-tag-${item.id}" style="display:none">
            <input type="text" list="dl-all-tags" placeholder="tag 名稱"
                   onkeydown="if(event.key==='Enter')confirmAddTag(${item.id})">
            <button onclick="confirmAddTag(${item.id})">OK</button>
        </span>`;

    const actionsHtml = item => `
        <button onclick="readFile(${item.id}, this.dataset.title)" data-title="${escAttr(item.title || item.filename)}" class="btn-read">閱讀</button>
        <button onclick="openFile(${item.id})" class="btn-secondary">開啟</button>
        <button onclick="showEditModal(${item.id})" class="btn-secondary">編輯</button>
        ${item.filepath && item.filepath.toLowerCase().endsWith('.zip') ? `<button onclick="deleteFile(${item.id}, this.dataset.fname)" data-fname="${escAttr(item.filename)}" class="btn-delete">刪除</button>` : ''}`;

    /* ── 縮圖輪詢機制 ── */
    let _thumbPollTimer = null;

    function startThumbPolling() {
        if (_thumbPollTimer) clearInterval(_thumbPollTimer);
        let tick = 0;
        _thumbPollTimer = setInterval(() => {
            const imgs = document.querySelectorAll('.thumb-img');
            let pending = 0;
            imgs.forEach(img => {
                // 已載入真實縮圖（寬度 > 1px）→ 跳過
                if (img.complete && img.naturalWidth > 1) return;
                pending++;
                // 每 3 秒 reload 一次 src（no-store 確保不用快取）
                const base = img.dataset.thumbUrl;
                if (base) img.src = base + '?t=' + Date.now();
            });
            tick++;
            // 全部載入完成或超過 60 次（~3 分鐘）→ 停止
            if (pending === 0 || tick > 60) {
                clearInterval(_thumbPollTimer);
                _thumbPollTimer = null;
            }
        }, 3000);
    }

    const thumbHtml = item =>
        `<img data-thumb-url="/api/thumb/${item.id}" src="/api/thumb/${item.id}" class="thumb-img" loading="lazy" alt="">`;

    const checkboxHtml = item => {
        const checked = selectedIds.has(item.id) ? 'checked' : '';
        return `<input type="checkbox" class="card-checkbox" data-id="${item.id}" ${checked} onclick="toggleSelect(${item.id}, this)">`;
    };

    if (viewMode === 'grid') {
        container.innerHTML = items.map(item => `
            <div class="card grid-card${selectedIds.has(item.id) ? ' selected' : ''}" data-id="${item.id}" tabindex="0">
                ${checkboxHtml(item)}
                <div class="grid-thumb">${thumbHtml(item)}</div>
                <div class="grid-info">
                    <div class="card-title">${esc(item.title || item.filename)}</div>
                    <div class="card-meta">${badgesHtml(item)}</div>
                    <div class="card-actions">${actionsHtml(item)}</div>
                </div>
            </div>
        `).join('');
    } else {
        container.innerHTML = items.map(item => `
            <div class="card list-card${selectedIds.has(item.id) ? ' selected' : ''}" data-id="${item.id}" tabindex="0">
                ${checkboxHtml(item)}
                <div class="list-thumb">${thumbHtml(item)}</div>
                <div class="list-info">
                    <div class="card-title">${esc(item.title || item.filename)}</div>
                    <div class="card-meta">${badgesHtml(item)}</div>
                    <div class="card-tags" id="tags-${item.id}">${tagsHtml(item)}</div>
                    <div class="card-actions">${actionsHtml(item)}</div>
                    <div class="card-filename">${esc(item.filename)}</div>
                </div>
            </div>
        `).join('');
    }

    // 開始輪詢尚未載入的縮圖
    startThumbPolling();
}

function esc(s) {
    if (!s) return '';
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}

function escAttr(s) {
    return esc(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── 分頁 ──
function renderPagination(total, page, perPage) {
    const totalPages = Math.ceil(total / perPage);
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }

    const range = 2;
    let html = '';

    if (page > 1) html += `<button class="page-btn" onclick="goPage(${page-1})">←</button>`;

    // 第一頁
    html += pageBtn(1, page);
    if (page - range > 2) html += '<span class="page-ellipsis">…</span>';

    // 中間頁碼
    for (let i = Math.max(2, page - range); i <= Math.min(totalPages - 1, page + range); i++) {
        html += pageBtn(i, page);
    }

    // 最後一頁
    if (page + range < totalPages - 1) html += '<span class="page-ellipsis">…</span>';
    if (totalPages > 1) html += pageBtn(totalPages, page);

    if (page < totalPages) html += `<button class="page-btn" onclick="goPage(${page+1})">→</button>`;

    // 跳頁
    html += `<span class="page-jump-group">
        <input type="number" class="page-jump" id="page-jump-input" min="1" max="${totalPages}" placeholder="頁"
               onkeydown="if(event.key==='Enter')jumpToPage(${totalPages})">
        <button class="page-btn" onclick="jumpToPage(${totalPages})">Go</button>
    </span>`;

    container.innerHTML = html;
}

function pageBtn(num, current) {
    return `<button class="page-btn${num === current ? ' active' : ''}" onclick="goPage(${num})">${num}</button>`;
}

function jumpToPage(max) {
    const input = document.getElementById('page-jump-input');
    const p = parseInt(input.value);
    if (p >= 1 && p <= max) goPage(p);
}

function goPage(p) {
    currentPage = p;
    doSearch();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

// ── 刪除檔案 ──
async function deleteFile(id, filename) {
    if (!confirm(`確定要刪除此檔案？\n\n${filename}\n\n此操作無法復原！`)) return;
    const res = await fetch(`/api/doujinshi/${id}`, {method: 'DELETE'});
    const data = await res.json();
    if (data.error) {
        showToast('刪除失敗: ' + data.error, 'error');
    } else {
        showToast('已刪除', 'info');
        doSearch();
    }
}

function showAddTag(id) {
    const el = document.getElementById(`add-tag-${id}`);
    el.style.display = 'inline-flex';
    el.querySelector('input').focus();
}

async function confirmAddTag(id) {

    await fetch(`/api/doujinshi/${id}/tags`, {

    showToast('Tag 已移除', 'info');
    await Promise.all([loadTags(), doSearch()]);
}

// ── Web 搜尋建議 ──
async function webSearchSuggestions() {
    const id = document.getElementById('edit-id').value;
    const btn = document.getElementById('btn-web-search');
    const resultsDiv = document.getElementById('web-search-results');

    btn.disabled = true;
    btn.textContent = '搜尋中…';
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = '<div class="ws-loading">正在搜尋多個來源…</div>';

    try {
        const res = await fetch(`/api/doujinshi/${id}/web-search`, {method: 'POST'});
        const data = await res.json();

        if (!data.suggestions || data.suggestions.length === 0) {
            resultsDiv.innerHTML = '<div class="ws-empty">沒有找到建議</div>';
            return;
        }

        resultsDiv.innerHTML = data.suggestions.map((s, i) => {
            const sourceLabel = {
                'dlsite': 'DLsite',
                'dlsite_search': 'DLsite',
                'web': 'Web',
                'pattern_infer': '推斷',
                'circle_infer': '社團推斷',
            }[s.source] || s.source;

            const conf = s.confidence ? `${Math.round(s.confidence * 100)}%` : '';

            let fields = '';
            if (s.circle) fields += `<span class="ws-field"><b>社團:</b> ${esc(s.circle)}</span>`;
            if (s.author) fields += `<span class="ws-field"><b>作者:</b> ${esc(s.author)}</span>`;
            if (s.parody) fields += `<span class="ws-field"><b>原作:</b> ${esc(s.parody)}</span>`;
            if (s.title) fields += `<span class="ws-field"><b>標題:</b> ${esc(s.title)}</span>`;
            if (s.reason) fields += `<span class="ws-field ws-reason">${esc(s.reason)}</span>`;

            return `
                <div class="ws-item">
                    <div class="ws-header">
                        <span class="ws-source ws-source-${s.source}">${sourceLabel}</span>
                        ${conf ? `<span class="ws-confidence">${conf}</span>` : ''}
                        <button onclick="applySuggestion(${i})" class="btn-apply">套用</button>
                    </div>
                    <div class="ws-fields">${fields}</div>
                </div>
            `;
        }).join('');

        resultsDiv._suggestions = data.suggestions;

    } catch (e) {
        resultsDiv.innerHTML = '<div class="ws-error">搜尋失敗，請稍後再試</div>';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Web 搜尋建議';
    }
}

function applySuggestion(index) {
    const resultsDiv = document.getElementById('web-search-results');
    const s = resultsDiv._suggestions[index];
    if (!s) return;

    if (s.event && !document.getElementById('edit-event').value.trim()) {
        document.getElementById('edit-event').value = s.event;
    }
    if (s.circle && !document.getElementById('edit-circle').value.trim()) {
        document.getElementById('edit-circle').value = s.circle;
    }
    if (s.author && !document.getElementById('edit-author').value.trim()) {
        document.getElementById('edit-author').value = s.author;
    }
    if (s.parody) {
        document.getElementById('edit-parody').value = s.parody;
    }
    if (s.title && !document.getElementById('edit-title').value.trim()) {
        document.getElementById('edit-title').value = s.title;
    }
}

async function saveEdit() {
    const id = document.getElementById('edit-id').value;
    const fields = {
        event: document.getElementById('edit-event').value.trim() || null,
        circle: document.getElementById('edit-circle').value.trim() || null,
        author: document.getElementById('edit-author').value.trim() || null,
        title: document.getElementById('edit-title').value.trim() || null,
        parody: document.getElementById('edit-parody').value.trim() || null,
        category: document.getElementById('edit-category').value,
    };
    await fetch(`/api/doujinshi/${id}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(fields)
    });
    closeEditModal();
    showToast('儲存成功', 'success');
    doSearch();
}

}

// ── 閱讀（Honeyview）──
async function readFile(id, title) {
    const res = await fetch(`/read/${id}`);
    const data = await res.json();
    if (data.error) {
        showToast('閱讀失敗: ' + data.error, 'error');
    } else {
        addToRecent(id, title);
    }
}

// ── 最近開啟 ──
function getRecent() {
    try { return JSON.parse(localStorage.getItem('recentOpened') || '[]'); }
    catch { return []; }
}

function addToRecent(id, title) {
    let recent = getRecent().filter(r => r.id !== id);
    recent.unshift({id, title, time: Date.now()});
    if (recent.length > 20) recent = recent.slice(0, 20);
    localStorage.setItem('recentOpened', JSON.stringify(recent));
}

function toggleRecent() {
    const list = document.getElementById('recent-list');
    if (list.style.display === 'none') {
        const recent = getRecent();
        if (recent.length === 0) {
            list.innerHTML = '<div class="recent-empty">尚無記錄</div>';
        } else {
            list.innerHTML = recent.map(r => {
                const ago = timeAgo(r.time);
                return `<div class="recent-item" data-id="${r.id}" data-title="${escAttr(r.title)}" onclick="readFile(+this.dataset.id, this.dataset.title); document.getElementById('recent-list').style.display='none'">
                    <span class="recent-title">${esc(r.title)}</span>
                    <span class="recent-time">${ago}</span>
                </div>`;
            }).join('');
        }
        list.style.display = 'block';
        // 點擊外部關閉
        setTimeout(() => {
            const close = (e) => {
                if (!document.getElementById('recent-dropdown').contains(e.target)) {
                    list.style.display = 'none';
                    document.removeEventListener('click', close);
                }
            };
            document.addEventListener('click', close);
        }, 0);
    } else {
        list.style.display = 'none';
    }
}

function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '剛才';
    if (mins < 60) return `${mins} 分鐘前`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} 小時前`;
    const days = Math.floor(hrs / 24);
    return `${days} 天前`;
}

// ── 設定 ──
let _scanRoots = [];

async function loadSettings() {
    const res = await fetch('/api/settings');
    const data = await res.json();
    document.getElementById('setting-viewer-path').value = data.viewer_path || '';
    document.getElementById('setting-thumb-size').value = data.thumb_size || '300x400';
    document.getElementById('setting-thumb-quality').value = data.thumb_quality || '80';
    applyThumbSizeToGrid(data.thumb_size || '300x400');
    try { _scanRoots = JSON.parse(data.scan_roots || '[]'); } catch(e) { _scanRoots = []; }
    renderScanRoots();
}

function renderScanRoots() {
    const container = document.getElementById('scan-roots-list');
    if (!_scanRoots.length) {
        container.innerHTML = '<div class="setting-hint" style="color:var(--warning)">尚未設定掃描路徑。請新增至少一個掃描來源。</div>';
        return;
    }
    container.innerHTML = _scanRoots.map((r, i) => `
        <div class="scan-root-item">
            <span class="scan-root-path">${esc(r.path)}</span>
            <span class="scan-root-label badge">${esc(r.label || r.source || '')}</span>
            <button class="btn-delete-small" onclick="removeScanRoot(${i})">移除</button>
        </div>
    `).join('');
}

async function addScanRoot() {
    const path = document.getElementById('new-scan-path').value.trim();
    if (!path) { showToast('請輸入路徑', 'error'); return; }
    const sel = document.getElementById('new-scan-source');
    const source = sel.value;
    const label = sel.options[sel.selectedIndex].text;
    _scanRoots.push({path, source, label});
    await saveScanRoots();
    document.getElementById('new-scan-path').value = '';
}

async function removeScanRoot(idx) {
    _scanRoots.splice(idx, 1);
    await saveScanRoots();
}

async function saveScanRoots() {
    await fetch('/api/settings', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({scan_roots: _scanRoots})
    });
    renderScanRoots();
    showToast('掃描路徑已更新');
}

async function saveSettings() {
    const viewerPath = document.getElementById('setting-viewer-path').value.trim();
    const thumbSize = document.getElementById('setting-thumb-size').value.trim();
    const thumbQuality = document.getElementById('setting-thumb-quality').value.trim();
    const res = await fetch('/api/settings', {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({viewer_path: viewerPath, thumb_size: thumbSize, thumb_quality: thumbQuality})
    });
    if (!res.ok) {
        const err = await res.json();
        showToast(err.error || '儲存失敗', 'error');
        return;
    }
    showToast('設定已儲存');
}

async function clearThumbs() {
    if (!confirm('確定要清除所有縮圖快取？下次瀏覽時會自動重新生成。')) return;
    const res = await fetch('/api/thumbs/clear', {method: 'POST'});
    const data = await res.json();
    showToast(`已清除 ${data.cleared} 個快取檔案`);
}

// ── 重新掃描 ──
async function rescan() {
    const btn = document.getElementById('btn-rescan');
    btn.disabled = true;
    btn.textContent = '掃描中…';
    try {
        await fetch('/api/rescan', {method: 'POST'});
        location.reload();
    } catch (e) {
        showToast('掃描失敗', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = '重新掃描';
    }
}

// ── 頁面切換 ──
function showPage(page) {
    const searchEls = [document.querySelector('.filters'), document.getElementById('results'), document.getElementById('pagination'), document.getElementById('batch-toolbar')];
    const pages = {
        merge: document.getElementById('page-merge'),
        stats: document.getElementById('page-stats'),
        settings: document.getElementById('page-settings'),
    };

    document.getElementById('nav-search').classList.toggle('active', page === 'search');
    document.getElementById('nav-merge').classList.toggle('active', page === 'merge');
    document.getElementById('nav-stats').classList.toggle('active', page === 'stats');
    document.getElementById('nav-settings').classList.toggle('active', page === 'settings');

    searchEls.forEach(el => el.style.display = 'none');
    Object.values(pages).forEach(el => el.style.display = 'none');

    if (page === 'search') {
        searchEls.forEach(el => el.style.display = '');
        updateBatchToolbar();
    } else if (page === 'merge') {
        pages.merge.style.display = '';
        loadDuplicates();
    } else if (page === 'stats') {
        pages.stats.style.display = '';
        loadStats();
    } else if (page === 'settings') {
        pages.settings.style.display = '';
        loadSettings();
    }
}

// ── 統計 ──
async function loadStats() {
    const res = await fetch('/api/stats');
    const data = await res.json();

    document.getElementById('stats-summary').innerHTML = `
        <div class="stat-card"><div class="stat-num">${data.total.toLocaleString()}</div><div class="stat-label">總收藏</div></div>
        <div class="stat-card"><div class="stat-num">${data.tagged.toLocaleString()}</div><div class="stat-label">已標記</div></div>
        ${data.categories.map(c => `<div class="stat-card"><div class="stat-num">${c.count.toLocaleString()}</div><div class="stat-label">${esc(c.name)}</div></div>`).join('')}
    `;

    renderBarChart('stat-parody', data.top_parody);
    renderBarChart('stat-author', data.top_author);
    renderBarChart('stat-circle', data.top_circle);
    renderBarChart('stat-event', data.top_event);
}

function renderBarChart(containerId, items) {
    const container = document.getElementById(containerId);
    if (!items || items.length === 0) { container.innerHTML = '<div class="no-results">無資料</div>'; return; }
    const max = items[0].count;
    container.innerHTML = items.map(item => `
        <div class="stat-bar-row" data-field="${containerId.replace('stat-', '')}" data-value="${escAttr(item.name)}" onclick="filterBy(this.dataset.field, this.dataset.value)">
            <span class="stat-bar-label" title="${escAttr(item.name)}">${esc(item.name)}</span>
            <div class="stat-bar-track">
                <div class="stat-bar-fill" style="width: ${Math.round(item.count / max * 100)}%"></div>
            </div>
            <span class="stat-bar-value">${item.count.toLocaleString()}</span>
        </div>
    `).join('');
}

// ── 合併管理 ──
let duplicateGroups = [];

async function loadDuplicates() {
    const field = document.getElementById('merge-field').value;
    const container = document.getElementById('merge-list');
    const summary = document.getElementById('merge-summary');

    container.innerHTML = '<div class="merge-loading">偵測重複中…</div>';
    summary.textContent = '';

    const res = await fetch(`/api/duplicates?field=${field}`);
    duplicateGroups = await res.json();

    if (duplicateGroups.length === 0) {
        container.innerHTML = '<div class="merge-empty">沒有偵測到重複項目</div>';
        summary.textContent = '0 組重複';
        return;
    }

    summary.textContent = `${duplicateGroups.length} 組重複`;
    renderDuplicateGroups(container);
}

function renderDuplicateGroups(container) {
    container.innerHTML = duplicateGroups.map((group, gi) => {
        const variantsHtml = group.variants.map((v, vi) => {
            const checked = v.value === group.canonical ? 'checked' : '';
            const jpBadge = v.is_japanese
                ? '<span class="merge-variant-badge jp">日文</span>'
                : '<span class="merge-variant-badge en">EN</span>';
            const nameClass = v.is_japanese ? 'merge-variant-name is-jp' : 'merge-variant-name';
            return `
                <label class="merge-variant">
                    <input type="radio" name="merge-${gi}" value="${escAttr(v.value)}"
                           ${checked} onchange="updateCanonicalInput(${gi}, this.value)">
                    <span class="${nameClass}">${esc(v.value)}</span>
                    ${jpBadge}
                    <span class="merge-variant-count">${v.count} 筆</span>
                </label>
            `;
        }).join('');

        return `
            <div class="merge-group" id="merge-group-${gi}">
                <div class="merge-group-header">
                    <span style="font-weight:500;font-size:0.9rem">重複組 #${gi + 1}</span>
                    <span class="merge-group-total">${group.total_count} 筆</span>
                </div>
                ${variantsHtml}
                <div class="merge-group-actions">
                    <input type="text" class="merge-canonical-input" id="canonical-${gi}"
                           value="${escAttr(group.canonical)}" placeholder="合併後的名稱">
                    <button class="btn-merge" onclick="doMerge(${gi})">合併</button>
                    <button class="btn-skip" onclick="skipGroup(${gi})">跳過</button>
                </div>
            </div>
        `;
    }).join('');
}

function updateCanonicalInput(groupIndex, value) {
    document.getElementById(`canonical-${groupIndex}`).value = value;
}

async function doMerge(groupIndex) {
    const group = duplicateGroups[groupIndex];
    const field = document.getElementById('merge-field').value;
    const canonical = document.getElementById(`canonical-${groupIndex}`).value.trim();

    if (!canonical) return;

    const oldValues = group.variants.map(v => v.value).filter(v => v !== canonical);
    if (oldValues.length === 0) {
        skipGroup(groupIndex);
        return;
    }

    const btn = document.querySelector(`#merge-group-${groupIndex} .btn-merge`);
    btn.disabled = true;
    btn.textContent = '合併中…';

    try {
        const res = await fetch('/api/merge', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ field, canonical, old_values: oldValues })
        });
        const data = await res.json();

        if (data.ok) {
            const el = document.getElementById(`merge-group-${groupIndex}`);
            el.innerHTML = `<div class="merge-status success">已合併 ${data.updated} 筆 → ${esc(canonical)}</div>`;
            duplicateGroups.splice(groupIndex, 1);
            setTimeout(() => { el.style.display = 'none'; }, 2000);
            document.getElementById('merge-summary').textContent = `${duplicateGroups.length} 組重複`;
        } else {
            const el = document.getElementById(`merge-group-${groupIndex}`);
            el.insertAdjacentHTML('beforeend', `<div class="merge-status error">合併失敗: ${esc(data.error)}</div>`);
            btn.disabled = false;
            btn.textContent = '合併';
        }
    } catch (e) {
        btn.disabled = false;
        btn.textContent = '合併';
    }
}

function skipGroup(groupIndex) {
    const el = document.getElementById(`merge-group-${groupIndex}`);
    el.style.display = 'none';
}

dlAllTags.id = 'dl-all-tags';
